<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="book" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="400" y="60" text-anchor="middle" fill="#e94560" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="42" font-weight="700">RAG = 开卷考试</text>
  <text x="400" y="95" text-anchor="middle" fill="#a0a0b0" font-family="ui-monospace, monospace" font-size="16">Retrieval-Augmented Generation</text>

  <!-- 桌子 -->
  <rect x="100" y="450" width="600" height="10" fill="#4a4a6a"/>

  <!-- 左边：闭卷考试（翻车版） -->
  <g transform="translate(120, 180)">
    <text x="120" y="-10" text-anchor="middle" fill="#e94560" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="600">❌ 不开卷</text>
    <!-- 学生头 -->
    <circle cx="120" cy="40" r="35" fill="#ffd9a0"/>
    <!-- 眼睛 X -->
    <text x="105" y="48" fill="#e94560" font-size="22" font-weight="700">×</text>
    <text x="130" y="48" fill="#e94560" font-size="22" font-weight="700">×</text>
    <!-- 嘴波浪 -->
    <path d="M 105 65 Q 115 58 125 65 T 145 65" stroke="#333" stroke-width="2" fill="none"/>
    <!-- 身体 -->
    <rect x="90" y="75" width="60" height="80" fill="#5a7fa8" rx="8"/>
    <!-- 答题纸 -->
    <rect x="30" y="180" width="180" height="80" fill="white" stroke="#888" stroke-width="2"/>
    <text x="40" y="200" fill="#333" font-family="ui-monospace, monospace" font-size="12">Q: 退款政策?</text>
    <text x="40" y="220" fill="#e94560" font-family="ui-monospace, monospace" font-size="12">A: 7天内可退</text>
    <text x="40" y="240" fill="#e94560" font-family="ui-monospace, monospace" font-size="12" opacity="0.7">  (编的, 真实规则未知)</text>
    <text x="120" y="285" text-anchor="middle" fill="#e94560" font-size="14" font-style="italic">hallucination ✨</text>
  </g>

  <!-- 中间箭头 -->
  <g transform="translate(380, 280)">
    <text x="20" y="-15" text-anchor="middle" fill="#a0d8a0" font-size="16" font-weight="600">查个书</text>
    <path d="M 0 0 L 40 20 L 0 40" stroke="#a0d8a0" stroke-width="4" fill="none"/>
  </g>

  <!-- 右边：开卷考试（RAG 版） -->
  <g transform="translate(520, 180)">
    <text x="120" y="-10" text-anchor="middle" fill="#a0d8a0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="600">✓ RAG</text>
    <!-- 学生头 -->
    <circle cx="120" cy="40" r="35" fill="#ffd9a0"/>
    <!-- 眼睛 -->
    <circle cx="108" cy="40" r="4" fill="#333"/>
    <circle cx="132" cy="40" r="4" fill="#333"/>
    <!-- 嘴微笑 -->
    <path d="M 105 60 Q 120 72 135 60" stroke="#333" stroke-width="2" fill="none"/>
    <!-- 身体 -->
    <rect x="90" y="75" width="60" height="80" fill="#7fa85a" rx="8"/>
    <!-- 翻开的书 -->
    <g transform="translate(30, 175)">
      <path d="M 0 0 L 90 0 L 90 90 L 0 90 Z" fill="url(#book)" stroke="#8b6914" stroke-width="2"/>
      <path d="M 90 0 L 180 0 L 180 90 L 90 90 Z" fill="url(#book)" stroke="#8b6914" stroke-width="2"/>
      <line x1="90" y1="0" x2="90" y2="90" stroke="#8b6914" stroke-width="2"/>
      <!-- 文字线 -->
      <line x1="10" y1="20" x2="80" y2="20" stroke="#8b6914" opacity="0.5"/>
      <line x1="10" y1="35" x2="80" y2="35" stroke="#8b6914" opacity="0.5"/>
      <line x1="10" y1="50" x2="70" y2="50" stroke="#8b6914" opacity="0.5"/>
      <line x1="100" y1="20" x2="170" y2="20" stroke="#8b6914" opacity="0.5"/>
      <line x1="100" y1="35" x2="170" y2="35" stroke="#8b6914" opacity="0.5"/>
      <!-- 高亮一句 -->
      <rect x="100" y="45" width="70" height="12" fill="#e94560" opacity="0.4"/>
    </g>
    <text x="120" y="285" text-anchor="middle" fill="#a0d8a0" font-size="14" font-style="italic">grounded ✓</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="550" text-anchor="middle" fill="#8888aa" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14">模型不会就翻书，翻完再答题。</text>
  <text x="400" y="575" text-anchor="middle" fill="#666688" font-family="ui-monospace, monospace" font-size="12">— ai-terms-fun / RAG</text>
</svg>
